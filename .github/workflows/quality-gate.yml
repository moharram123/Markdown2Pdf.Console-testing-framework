name: quality-gate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create result folders
        run: |
          mkdir -p results/generated-pdfs
          mkdir -p results/test-reports
          mkdir -p results/metrics
          mkdir -p results/diffs

      - name: Run tests
        run: |
          pytest tests --html=results/test-reports/report.html --self-contained-html

      - name: Debug results folder
        run: |
          echo "=== RESULTS TREE ==="
          find results -maxdepth 3 -type f | sort

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-artifacts
          path: results/
      
      - name: Commit results back to repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "ci: update test results [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}