name: LLM Automated Quality Gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  llm-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-llm.txt

      - name: Run full LLM automation pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/run_full_pipeline.py

      - name: Upload LLM pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-quality-gate-results
          path: |
            data/external-sources/
            data/llm-generated/
            results/generated-pdfs/
            results/test-reports/