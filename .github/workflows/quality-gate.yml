name: quality-gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install LLM dependencies
        run: pip install -r requirements-llm.txt

      - name: Create result folders
        run: |
          mkdir -p results/generated-pdfs
          mkdir -p results/test-reports
          mkdir -p results/metrics
          mkdir -p results/diffs
          mkdir -p results/llm-quality-check

      - name: Run core test suite
        run: |
          pytest tests --html=results/test-reports/report.html --self-contained-html

      - name: Run LLM quality check
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m llm_experiments.llm_quality_check

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-artifacts
          path: results/

      - name: Commit results back to repo
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add results/
          git diff --staged --quiet || git commit -m "ci: update test results [skip actions]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}