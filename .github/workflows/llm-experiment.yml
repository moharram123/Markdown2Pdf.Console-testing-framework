name: LLM Automated Quality Gate

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  llm-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Install Markdown2Pdf.Console
        run: |
          dotnet tool install --global Markdown2Pdf.Console --version 2.0.2
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify md2pdf
        run: md2pdf --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-llm.txt

      - name: Run full automated LLM pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/run_full_pipeline.py

      - name: Upload LLM pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-quality-gate-results
          path: |
            data/external-sources/
            data/llm-generated/
            results/generated-pdfs/
            results/test-reports/

      - name: Commit generated data and results
        if: always() && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f data/external-sources/
          git add -f data/llm-generated/
          git add -f results/

          git commit -m "Update generated LLM data and results" || echo "No generated changes to commit"
          git push